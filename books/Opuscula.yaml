description_short:
  en: The personal writings of St. Francis, including letters, exhortations, poetry, hymns and reflections.
  it: Gli scritti redatti personalmente da San Francesco, che includono lettere, esortazioni, poesie, canti liturgici e riflessioni.
description:
  en: |-
    In his willful simplicity, St. Francis did not write much. What is more, several of his writings have come down
    to us incomplete or in fragments.

    Even so, beyond the most important texts - such as the Rules and the Testament, the Admonitions and the sizeable
    Office of the Passion - we preserve a small but spiritually rich collection of letters, exhortations, fragments
    of rules, and other brief reflections. Among these, letters to two other saints stand out: St. Clare and St. Anthony.

    In Kajetan Esser's edition all of these texts are gathered together under the title Opuscula. Here, instead, the
    major works - the two Rules, the Office of the Passion, and the Admonitions - have been drawn out as standalone
    books, so that each can be read chapter by chapter; this collection therefore gathers only the minor works, which,
    being short, sit more comfortably together than on their own.
  it: |-
    San Francesco, nella sua semplicità voluta, non ha scritto molto. Inoltre, diversi dei suoi scritti ci sono
    giunti incompleti o frammentati.

    Ciò nonostante, oltre ai testi più importanti - come le Regole ed il Testamento, le Ammonizioni ed il corposo
    Ufficio della Passione - conserviamo una piccola ma spiritualmente ricca raccolta di lettere, esortazioni,
    frammenti di regole ed altre brevi riflessioni. Tra queste spiccano le lettere ad altri due santi: Santa Chiara
    e Sant'Antonio.

    Nell'edizione di Kajetan Esser tutti questi testi sono raccolti insieme sotto il titolo di Opuscoli. Qui, invece,
    le opere maggiori - le due Regole, l'Ufficio della Passione e le Ammonizioni - sono state estratte come libri a
    sé stanti, così da poterle consultare capitolo per capitolo; questa raccolta riunisce dunque le sole opere minori,
    che per la loro brevità restano più a loro agio insieme che da sole.
