# Descriptions by Alfredo Salata <as@salata.ovh>
description_short:
  en: "The second biography of Saint Francis, written by Thomas of Celano — an intimate portrait drawn from the companions' recollections."
  it: "La seconda biografia di San Francesco scritta da Tommaso da Celano, un ritratto intimo tratto dai ricordi dei compagni."
description:
  en: |-
    The *Memoriale in desiderio animae*, traditionally called the *Vita seconda*, is the second
    biography of Saint Francis composed by Thomas of Celano, some eighteen years after the first.
    It was born in response to the General Chapter of 1244, when the minister general Crescentius of
    Iesi invited all the friars to send in whatever they remembered of the founder.

    The many testimonies that came back gave Thomas an abundance of new material, and the result is
    a far richer and more intimate portrait than the first. The *Memoriale* is arranged in two parts
    and, except for the first — which retraces the saint's youth and conversion —, abandons
    chronological order. The second, by far the more extensive, arranges its episodes around the
    saint's virtues and inner spirit: poverty, prayer, tenderness toward creatures, the longing for
    humility.

    The *Vita seconda* shares the hagiographic and theological aim of the *Vita prima*, yet it suffers
    from the overabundance of material gathered — which Thomas cannot sift through fully and
    effectively — and from the political tensions that troubled the order at the time.

    A debate was in fact under way between the more rigorous Franciscans, who lamented a drift from
    the original principles of poverty, and those who instead pressed for a modernization that would
    allow a more moderate approach and a greater integration of the order into ecclesiastical
    institutions, such as the theological universities.

    Thomas, more moderate at the time he wrote his first biography, does not conceal here a certain
    sympathy for the rigorist current, presenting some aspects of the saint's life in a rather
    polemical key.

    The text is nonetheless the most extensive of the saint's biographies, exceedingly rich in events
    and tales — if not always rigorously verified — useful for enriching one's meditation on the Poor
    Man of Assisi.
  it: |-
    Il *Memoriale in desiderio animae*, tradizionalmente detto *Vita seconda*, è la seconda
    biografia di San Francesco composta da Tommaso da Celano, circa diciotto anni dopo la
    prima. Nacque in risposta al Capitolo generale del 1244, quando il ministro generale
    Crescenzio da Iesi invitò tutti i frati a inviare quanto ricordavano del fondatore.

    Le numerose testimonianze che ne tornarono diedero a Tommaso un'abbondanza di materiale nuovo,
    e il risultato è un ritratto assai più ricco ed intimo del primo. Il *Memoriale* si articola in
    due parti e, salvo per la prima — che ripercorre la gioventù e la conversione del santo —,
    abbandona l'ordine cronologico. La seconda, di gran lunga più ampia, organizza gli episodi
    attorno alle virtù e allo spirito interiore del santo: la povertà, la preghiera, la tenerezza
    verso le creature, il desiderio di umiltà.

    La *Vita Seconda* condivide l'intento agiografico e teologico della *Prima Vita*, risentendo
    però della sovrabbondanza di materiale raccolto — che Tommaso non può vagliare in maniera
    completa ed efficace — e delle tensioni politiche che interessavano l'ordine all'epoca.

    Si consumava infatti un dibattito tra i francescani più rigorosi, che lamentavano una deriva
    dai principi di povertà originali, e quelli che invece spingevano per un ammodernamento che
    consentisse un approccio più moderato ed una maggiore integrazione dell'ordine nelle
    istituzioni ecclesiastiche, quali le università teologiche.

    Tommaso, più moderato ai tempi della stesura della sua prima biografia, non nasconde
    qui una certa simpatia per la corrente rigorista, presentando alcuni aspetti della vita del
    santo in chiave piuttosto polemica.

    Il testo è comunque il più ampio tra le biografie del Santo, ricchissimo di eventi e racconti,
    se non sempre rigorosamente verificati, utili ad arricchire la meditazione sul Poverello di Assisi.
