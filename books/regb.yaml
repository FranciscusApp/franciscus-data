description_short:
  en: "The definitive Rule of the Friars Minor, confirmed by the bull of Pope Honorius III in 1223."
  it: "La Regola definitiva dei Frati Minori, confermata dalla bolla di papa Onorio III nel 1223."
description:
  en: |-
    The Later Rule (Regula Bullata) is the definitive Rule of the Order of Friars Minor, solemnly confirmed by Pope Honorius III with the bull Solet annuere on 29 November 1223. In twelve short chapters it fixes the form of life of the brothers: their reception and clothing, the divine office and fasting, the manner of working and of going through the world without money, the correction and governance of the brothers, obedience, and the mission among believers and unbelievers. It remains the juridical foundation of the Order to this day.
  it: |-
    La Regola Bollata (Regula Bullata) è la Regola definitiva dell'Ordine dei Frati Minori, confermata solennemente da papa Onorio III con la bolla Solet annuere il 29 novembre 1223. In dodici brevi capitoli fissa la forma di vita dei frati: la loro accoglienza e il vestito, l'ufficio divino e il digiuno, il modo di lavorare e di andare per il mondo senza denaro, la correzione e il governo dei frati, l'obbedienza e la missione fra credenti e non credenti. Resta a tutt'oggi il fondamento giuridico dell'Ordine.
