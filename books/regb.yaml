description_short:
  en: "The definitive Rule of the Friars Minor, confirmed by the bull of Pope Honorius III in 1223."
  it: "La Regola definitiva dei Frati Minori, confermata dalla bolla di papa Onorio III nel 1223."
description:
  en: |-
    The *Later Rule* (*Regula Bullata*) is the definitive Rule of the Order of Friars Minor, solemnly confirmed by
    Pope Honorius III with the bull *Solet annuere* on 29 November 1223. In twelve short chapters it fixes the
    friars' form of life, setting out each aspect in detail.

    Francis specifies every aspect with care: from how to receive and clothe the brothers, to how to recite the
    divine office and keep the fast, down to the manner of working and of going through the world without money. He
    then dwells on the correction and governance of the brothers, on obedience to superiors, and on the mission of
    preaching entrusted to the order and directed to believers and unbelievers alike.

    The text remains to this day the juridical foundation of the Order.
  it: |-
    La *Regola Bollata* (*Regula Bullata*) è la Regola definitiva dell'Ordine dei Frati Minori, confermata
    solennemente da papa Onorio III con la bolla *Solet annuere* il 29 novembre 1223. In dodici brevi capitoli
    fissa la forma di vita dei frati, spiegando minuziosamente ciascun aspetto.

    Francesco dettaglia ogni aspetto con attenzione: dal modo di accogliere e vestire i fratelli, a come recitare
    l'ufficio divino e praticare il digiuno, sino al modo di lavorare e di andare per il mondo senza denaro. Si sofferma
    poi sulla correzione e il governo dei frati, sull'obbedienza ai superiori e sulla missione di predicazione affidata
    all'ordine e rivolta ai credenti e ai non credenti.

    Il testo è tutt'oggi il fondamento giuridico dell'Ordine.
