# Descriptions by Alfredo Salata <as@salata.ovh>
description_short:
  en: The first biography of Saint Francis, written for his canonization, shortly after his death.
  it: La prima biografia di San Francesco, scritta per la sua canonizzazione, poco dopo la sua morte.
description:
  en: |-
    The Vita prima is the first biography of Saint Francis, written by Thomas of Celano
    at the command of Pope Gregory IX in the months surrounding the canonization of 1228.
    Composed barely two years after Sthe saint's death by a friar who had known him, it is
    the closest in time of all the Franciscan sources, and the one from which nearly every
    later legend would draw.

    Thomas divides the work into three books: the first follows the historical order of
    Francis's conversion and life, the second narrates his final years and his death, and
    the third recounts the miracles and the solemn canonization at the hands of Gregory IX,
    whose reverence for the saint Thomas records with evident affection.

    More than a chronicle, the Vita prima is the official act by which the Church received
    Francis into the company of the saints, and it preserves the freshness of a memory still
    living: the leper, the crucifix of San Damiano, the renunciation before the bishop, the
    crib of Greccio, and the stigmata of La Verna are first set down here.
  it: |-
    La Vita prima è la prima biografia di San Francesco, scritta da Tommaso da Celano
    per incarico di papa Gregorio IX nei mesi attorno alla canonizzazione del 1228.
    Composta appena due anni dopo la morte del santo da un frate che lo aveva conosciuto,
    è la più vicina nel tempo fra tutte le fonti francescane, e quella da cui attingeranno
    quasi tutte le leggende successive.

    Tommaso divide l'opera in tre libri: il primo segue l'ordine storico della conversione
    e della vita di Francesco, il secondo narra i suoi ultimi anni e la sua morte, il terzo
    raccoglie i miracoli e la solenne canonizzazione per mano di Gregorio IX, di cui Tommaso
    ricorda la venerazione con evidente affetto.

    Più che una cronaca, la Vita prima è l'atto ufficiale con cui la Chiesa accolse Francesco
    nel numero dei santi, e conserva la freschezza di una memoria ancora viva: il lebbroso,
    il crocifisso di San Damiano, la rinuncia davanti al vescovo, il presepe di Greccio e le
    stimmate della Verna vi sono fissati per la prima volta.

