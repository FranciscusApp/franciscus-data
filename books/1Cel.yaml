# Descriptions by Alfredo Salata <as@salata.ovh>
description_short:
  en: The first biography of Saint Francis, written for his canonization, shortly after his death.
  it: La prima biografia di San Francesco, scritta per la sua canonizzazione, poco dopo la sua morte.
description:
  en: |-
    The Vita prima is the first biography of **Saint Francis**, written by **Thomas of Celano**
    at the command of **Pope Gregory IX** in the months surrounding the **canonization** of 1228.
    Composed barely two years after the saint's death by a friar who had known him, it is
    the closest in time of all the biographies of Saint Francis.

    Many of the events concerning the saint are already crystallized in this writing:
    the meeting with the **leper**, his father's persecution, the renunciation before the bishop,
    the crib of **Greccio**, and the **stigmata** of **La Verna**; the tone is deeply affectionate and celebratory.

    Compared with the later sources, one should note the harsh judgement passed on Francis's
    origins, which this Celano recounts as truly dissolute. Already in the *Vita secunda* this
    aspect would be softened, as indeed they are presented more gently in the *Legend of the
    Three Companions* — ascribed by tradition to the original companions.

    It is possible that Thomas, less familiar with **Assisi** than the first companions, exaggerated
    these origins in order to heighten the role of grace, thus drawing a parallel between the
    **conversion** of Francis and that of **Saint Paul**. Indeed the whole structure of the book is
    theological: Francis's ministry is narrated as a parallel to the ministry of **Christ**, with
    the saint who «travels through the villages proclaiming the kingdom of God,» his death
    recalling the Passion, and the miracles after his death and through the canonization being
    an image of the triumph of the Resurrection.

    Celano's work is therefore guided in part by an intent that transcends historical accuracy,
    yet for this very reason it offers a spiritual value unique and distinct from the *Legend of
    the Three Companions*, more sober and personal, or from the more rigorous and organic *Major
    Legend* of **Bonaventure**.
  it: |-
    La Vita prima è la prima biografia di **San Francesco**, scritta da **Tommaso da Celano**
    per incarico di **papa Gregorio IX** nei mesi attorno alla **canonizzazione** del 1228.
    Composta appena due anni dopo la morte del santo da un frate che lo aveva conosciuto,
    è la più vicina nel tempo fra tutte le biografie su San Francesco.

    Molti dei fatti riguardanti il santo sono cristallizzati già in questo scritto: 
    l'incontro con il **lebbroso**, la persecuzione paterna, la rinuncia davanti al vescovo, 
    il presepe di **Greccio** e le **stimmate** della **Verna**; il tono è molto affettuoso e celebrativo.

    Rispetto alle fonti successive va notato il crudo giudizio rispetto alle origini di Francesco,
    raccontate da questo Celano come veramente dissolute. Già nella *Vita Seconda* questo aspetto sarà 
    attenuato, come del resto sono presentate in maniera più morbida nella *Leggenda dei Tre Compagni*
    — attribuita dalla tradizione ai compagni originali.

    È possibile che Tommaso, meno familiare con **Assisi** dei primi compagni, abbia esagerato
    queste origini per accentuare il ruolo della grazia, tracciando così un parallelo tra la 
    **conversione** di Francesco e quella di **San Paolo**. Del resto l'intera struttura del libro
    è teologica: il ministero di Francesco è narrato come parallelo del ministero di **Cristo**,
    con il Santo che «viaggia per i villaggi annunciando il regno di Dio», la sua morte richiama
    la Passione, ed i miracoli dopo la morte e attraverso la canonizzazione sono immagine del trionfo
    della Resurrezione.

    Il lavoro di Celano è quindi in parte guidato da un intento che trascende l'accuratezza storica,
    ma proprio per questo offre un valore spirituale unico e diverso dalla *Leggenda dei Tre Compagni*,
    più sobria e personale, o dalla più rigorosa e organica *Leggenda Maggiore* di **Bonaventura**.
