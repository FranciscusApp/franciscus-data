description_short:
  en: "Twenty-eight short spiritual admonitions of St. Francis to his brothers, on the Eucharist, obedience, humility, and the virtues."
  it: "Ventotto brevi ammonizioni spirituali di San Francesco ai suoi frati, sull'Eucaristia, l'obbedienza, l'umiltà e le virtù."
description:
  en: |-
    The Admonitions gather twenty-eight brief exhortations that St. Francis addressed to his brothers, most likely delivered at chapter gatherings. Terse and pointed, they range over the mystery of the Eucharist and the hidden presence of the Lord, the evil of self-will, true and false obedience, and a long series of beatitude-like sayings on humility, patience, charity, poverty of spirit, and peace. Together they form the closest thing to a spiritual doctrine in Francis's own words.
  it: |-
    Le Ammonizioni raccolgono ventotto brevi esortazioni che San Francesco rivolse ai suoi frati, probabilmente pronunciate durante i capitoli. Concise e incisive, spaziano dal mistero dell'Eucaristia e dalla presenza nascosta del Signore al male della propria volontà, dalla vera e falsa obbedienza a una lunga serie di detti in forma di beatitudine sull'umiltà, la pazienza, la carità, la povertà di spirito e la pace. Insieme costituiscono quanto di più vicino a una dottrina spirituale nelle parole stesse di Francesco.
