description_short:
  en: "Twenty-eight short spiritual admonitions of Saint Francis to his brothers, on the Eucharist, obedience, humility and the virtues."
  it: "Ventotto brevi ammonizioni spirituali di San Francesco ai suoi frati, sull'Eucaristia, l'obbedienza, l'umiltà e le virtù."
description:
  en: |-
    The *Admonitions* gather twenty-eight brief exhortations that Saint Francis addressed to his brothers. Their
    date of composition is uncertain, but they may have been delivered at the chapters held at the Porziuncola.

    The texts, terse yet spiritually cutting, range over many aspects of the life of faith: from the mystery of
    the Eucharist, to the drama of the divine hiddenness, to the wounds of sin in the will, to reflections on
    what constitutes an **authentic obedience**. To these themes is added a long series of beatitude-like sayings
    on humility, patience, charity, poverty of spirit and peace.

    Together, the *Admonitions* form the closest thing to a spiritual doctrine in Francis's own words, and give a
    glimpse of how mature, refined and self-aware the spirituality of the Saint was — of one who nonetheless
    called himself a «poor and ignorant» friar.

    This, perhaps more than anything, is the mark of an inspired saint: to know those secrets that God has willed
    to «hide from the wise and learned», and to be able to reveal them, with simple and telling words, to the
    little ones of the kingdom.
  it: |-
    Le *Ammonizioni* raccolgono ventotto brevi esortazioni che San Francesco rivolse ai suoi frati. Il periodo di redazione
    è incerto, ma potrebbero essere state pronunciate durante i capitoli alla Porziuncola.

    I testi, concisi ma spiritualmente taglienti, coprono molti aspetti della vita di fede: dal mistero dell'Eucaristia,
    al dramma del nascondimento divino, alle ferite del peccato nella volontà, a riflessioni su cosa costituisca
    un'**obbedienza autentica**. A questi temi si aggiunge una lunga serie di detti in forma di beatitudine sull'umiltà,
    la pazienza, la carità, la povertà di spirito e la pace.

    Insieme, le *Ammonizioni* costituiscono quanto di più vicino a una dottrina spirituale nelle parole stesse di Francesco,
    e danno uno spaccato su quanto la spiritualità del Santo, che pure definiva sé stesso un frate «poverello e ignorante»,
    fosse matura, raffinata e consapevole.

    È forse questo, più di altri, il marchio di un santo ispirato: conoscere quei segreti che Dio ha voluto «nascondere ai
    dotti e sapienti», e saperli rivelare con parole semplici ed efficaci ai piccoli del regno.
