# Descriptions by Alfredo Salata <as@salata.ovh>
description_short:
  en: "The testament of Saint Francis, written a few months before his death."
  it: "Il testamento di San Francesco, scritto pochi mesi prima della sua morte."
description:
  en: |-
    The testament of Saint Francis, more than any other document about him, reveals to us who the Saint of
    Assisi truly was, showing us how Francis's uniqueness is not confined to his love of poverty.
    In the High Middle Ages the pauperist movements were nothing new; one need only think of the Waldensians or the Cathars.

    These movements, however, were often fuelled by a spirit of protest against the Church of the time,
    too often compromised with power, politics and wealth. For this reason, just as often, such movements
    ended up taking on a **heretical character**, straying from «sound doctrine» and acquiring a fragile
    conception of ecclesial unity.

    It is precisely the *Testament* that makes unmistakable the difference of Francis's charism from movements
    of this kind, and so makes his uniqueness evident. This text reveals to us a Francis who, fully conscious
    of his powerful prophetic mandate — «no one showed me what I ought to do, but the Most High himself», he writes —
    is equally conscious that this charism can be lived only in obedience to the Church.

    The Francis of the *Testament* declares indeed that he wishes to be submitted to the priests, even sinners,
    even when they are a source of persecution. He is not a naïve Francis, but rather one aware that his charism
    must be absorbed — and metabolized — by the Church. It is clear from these lines that he already foresees the
    difficulties of this process; yet at the same time he is able to recall his own story with tenderness and
    serenity, and to entrust the brothers «whom the Lord has given him», now in turn, to the care of the Church
    in the person of the Bishop of Ostia.

    Reading the blessing with which the Saint of Assisi takes his leave, we cannot forget that in these moments
    he was bearing the cross of grave illness — by now blind and worn out by his infirmities, and marked by the
    stigmata. Nor can one fail to be struck by the peace of this «little friar», who in every word shows the
    spirit of the **patient Bridegroom** to whom he had conformed himself — his Jesus — and in none the traits
    of the resentful, marginalized rebel.
  it: |-
    Il testamento di San Francesco, più di qualsiasi altro documento su di lui, ci rivela chi veramente
    fosse il Santo di Assisi, mostrandoci come l'unicità di Francesco non sia limitata al suo amore per la povertà.
    Nel basso medioevo i movimenti pauperistici non rappresentavano una novità; si pensi ai valdesi o ai catari.

    Questi movimenti erano però spesso alimentati da uno spirito di contestazione nei confronti della Chiesa del tempo,
    troppo spesso compromessa con il potere, la politica e la ricchezza. Per questa ragione, altrettanto spesso tali movimenti
    finivano per assumere una **natura ereticale**, deviando dalla «buona dottrina» e acquisendo una concezione labile dell'unità
    ecclesiale.

    È proprio il *Testamento* a rendere inequivocabile la differenza del carisma di Francesco rispetto a questo genere di movimenti,
    e così a rendere evidente la sua unicità. Questo testo ci rivela un Francesco che, pienamente cosciente
    del suo potente mandato profetico — «nessuno mi mostrava cosa dovessi fare, ma lo stesso Altissimo», scrive — è altrettanto
    cosciente che questo carisma non può essere vissuto che nell'obbedienza alla Chiesa.

    Il Francesco del *Testamento* afferma infatti di voler essere sottomesso ai sacerdoti, siano pure peccatori, siano pure
    fonte di persecuzione. Non è un Francesco ingenuo, ma anzi consapevole che il suo carisma dovrà essere assorbito — e metabolizzato
    — dalla Chiesa. Traspare chiaramente dalle righe che egli già prevede le difficoltà di questo processo; ma allo stesso tempo risulta
    capace di ricapitolare con tenerezza e serenità la sua storia, e di affidare i fratelli «che il Signore gli ha affidato»,
    ora a sua volta, alla custodia della Chiesa nella persona del Vescovo di Ostia.

    Leggendo la benedizione con cui il Santo di Assisi si congeda, non possiamo dimenticare che in questi momenti viveva la croce della grave
    malattia — era ormai cieco e stremato dalle infermità, nonché segnato dalle stimmate. Non può inoltre non impressionare la pace
    di questo «frate piccolino», che in ogni parola mostra lo spirito dello **Sposo paziente** a cui si era conformato — il suo Gesù — ed
    in nessuna i tratti del ribelle rancoroso ed emarginato.
