# Descriptions by Alfredo Salata <as@salata.ovh>
description_short:
  en: The testament of Saint Francis, written a few months before his death.
  it: Il testamento di San Francesco, scritto pochi mesi prima della sua morte.
description:
  en: |-
    The testament of Saint Francis, more than any other document about him, reveals to us who the Saint of Assisi
    truly was, showing us how the uniqueness of Francis is not confined to his love of poverty.
    Indeed, at the beginning of the twelfth century the pauperist movements were nothing new, though they were often
    heretical in character — one need only think of the Waldensians or the Cathars.

    It is precisely the Testament that shows, in unmistakable fashion, what set Francis apart from these movements and
    that gives us the hermeneutic for understanding his whole story. This text reveals to us a Francis who, fully conscious
    of his powerful prophetic mandate — "no one showed me what I ought to do, but the Most High himself" — is equally
    conscious that this charism can be lived only in obedience to the Church.

    The Francis of the Testament desires to be submitted to the priests, even sinners, even when they are a source of persecution;
    he entrusts his Order to the care of a bishop, and understands himself authentically as a servant of this People of God.
    At the same time, he is a Francis who recalls with tenderness his own story and that of the brothers whom the Lord entrusted to him,
    serene and at peace — let us remember that in these moments he was living the cross of grave illness — with nothing more to add but
    his final blessing.

    This text alone is enough to dispel every illusion of a Francis repressed and rebellious, bitterly betrayed or
    abandoned by the Church.
  it: |-
    Il testamento di San Francesco, più di qualsiasi altro documento su di lui, ci rivela chi veramente
    fosse il Santo di Assisi, mostrandoci come la sua unicità di Francesco non sia limitata al suo amore per la povertà.
    In effetti, all'inizio del XII secolo i movimenti pauperistici non rappresentavano una novità, pur avendo spesso natura
    di contestazione ereticale — si pensi ai valdesi o ad i catari.

    È proprio il Testamento a mostrare in maniera inequivocabile cosa distinguesse Francesco da questi movimenti e a
    fornirci l'ermeneutica per capire tutta la sua storia. Questo testo ci rivela un Francesco che, pienamente cosciente
    del suo potente mandato profetico — "nessuno mi mostrava cosa dovessi fare, ma lo stesso Altissimo" — è altrettanto
    cosciente che questo carisma non può essere vissuto che nell'obbedienza alla Chiesa.

    Il Francesco del Testamento desidera essere sottomesso ai sacerdoti, siano pure peccatori, siano pure fonte di persecuzione;
    affida il suo Ordine alla cura di un vescovo, e si concepisce autenticamente come servitore di questo Popolo di Dio.
    Allo stesso tempo, è un Francesco che ricorda con dolcezza la sua storia e quella dei fratelli che il Signore gli ha affidato,
    sereno ed in pace — ricordiamo che in questi momenti viveva la croce della grave malattia — senza altro da aggiungere se non
    la sua estrema benedizione.

    Questo testo, da solo, è sufficiente a dissipare ogni illusione di un Francesco represso e ribelle, amaramente tradito o
    abbandonato dalla Chiesa.

