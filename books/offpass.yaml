description_short:
  en: "A devotional office of the Passion composed by Saint Francis: fifteen psalms he wove from Scripture, arranged for the hours across the liturgical seasons."
  it: "Un ufficio devozionale della Passione composto da San Francesco: quindici salmi da lui intessuti dalla Scrittura, disposti per le ore lungo i tempi liturgici."
description:
  en: |-
    The *Office of the Passion* is a private devotional office composed by Saint Francis, whose heart is the
    meditation on the Lord's suffering.

    Rather than write new prayers, Francis wove fifteen «psalms» using almost exclusively verses drawn from the
    Scriptures, placing them on the lips of Christ in his Passion. The office is arranged in five parts for the
    different liturgical seasons (the Sacred Triduum and ferial time, Eastertide, Sundays and feasts, Advent, and
    Christmas), each of which distributes the psalms across the canonical hours.

    Every recitation is framed by the antiphon *Sancta Maria Virgo*, a witness to Francis's tender devotion to
    the **Most Holy Virgin**.
  it: |-
    L'*Ufficio della Passione* è un ufficio devozionale privato composto da San Francesco, il cui centro è costituito dalla
    meditazione sulla sofferenza del Signore.

    Anziché scrivere nuove preghiere, Francesco intessé quindici «salmi» usando quasi esclusivamente versetti tratti dalle Scritture,
    ponendoli sulle labbra di Cristo nella sua Passione. L'ufficio è disposto in cinque parti per i diversi tempi liturgici (il Sacro Triduo
    e il tempo feriale, il tempo pasquale, le domeniche e le feste, l'Avvento e il Natale), ciascuna delle quali distribuisce
    i salmi lungo le ore canoniche.

    Ogni recitazione è incorniciata dall'antifona *Sancta Maria Virgo*, a testimonianza della tenera devozione di Francesco per la
    **Santissima Vergine**.
