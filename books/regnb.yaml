description_short:
  en: "The first Rule Francis formally drafted. Longer, more rhetorical and theological than the Rule of 1223, it was never approved."
  it: "La prima regola formalmente redatta da Francesco. Più lunga, più retorica e teologica della Regola del 1223, non fu mai approvata."
description:
  en: |-
    The *Earlier Rule* of 1221 is the first rule Francis formally drafted. Compared with the Rule of 1223 it is
    longer, more rhetorical and more theological. Alongside its legislative chapters Francis sets lengthy
    exhortations and scriptural quotations, and the text closes with a final prayer of thanksgiving.

    It was never approved — partly because of its scarcely «canonical» style and its lack of an organic legislative
    structure, partly because of the sheer severity of the way of life it proposed. Even so, it preserves a vivid
    witness to the raw, primitive charism of the fraternity.
  it: |-
    La *Regola non bollata* del 1221 è la prima regola formalmente redatta da Francesco. Rispetto alla Regola del 1223,
    risulta più lunga, più retorica e teologica. Accanto ai capitoli legislativi, Francesco affianca lunghe esortazioni e
    citazioni scritturali. Il testo è chiuso da una preghiera finale di ringraziamento.

    Non fu approvata, in parte a causa del suo stile poco «canonico» e della mancanza di una struttura legislativa organica,
    in parte per l'eccessiva durezza della proposta di vita. Ciò nonostante, preserva una testimonianza vivida del carisma
    grezzo e primitivo della fraternità.
