description_short:
  en: "The earlier, unconfirmed Rule of the Friars Minor (1221): longer, more scriptural and exhortatory than the Rule of 1223."
  it: "L'anteriore Regola non confermata dei Frati Minori (1221): più lunga, più scritturale ed esortativa della Regola del 1223."
description:
  en: |-
    The Earlier Rule (Regula non Bullata) of 1221 is the fuller, unsealed Rule that preceded the bull-confirmed Rule of 1223. Never given papal confirmation, it is longer, warmer, and far more scriptural: alongside its legislative chapters it weaves lengthy exhortations, gospel quotations, and a closing prayer of thanksgiving. It preserves the primitive spirit of the fraternity — its radical poverty, its manner of working and begging, its mission among the Saracens — before the text was pared down into the definitive Rule.
  it: |-
    La Regola non bollata (Regula non Bullata) del 1221 è la Regola più ampia e non sigillata che precedette la Regola bollata del 1223. Mai confermata dal papa, è più lunga, più calda e assai più scritturale: accanto ai capitoli legislativi intreccia lunghe esortazioni, citazioni evangeliche e una preghiera finale di ringraziamento. Conserva lo spirito primitivo della fraternità — la sua povertà radicale, il suo modo di lavorare e di chiedere l'elemosina, la sua missione fra i Saraceni — prima che il testo fosse ridotto nella Regola definitiva.
