# Descriptions by Alfredo Salata <as@salata.ovh>
description_short:
  en: The normative and official biography of St. Francis for the Franciscan Order.
  it: La biografia normativa e ufficiale di San Francesco per l'Ordine francescano.
description:
  en: |-
    The Legenda Maior is the normative and official biography of **St. Francis** for the **Franciscan Order**.
    Written in 1263 by **Bonaventura of Bagnoregio**, at the time Minister General of the Ordo Fratrum Minorum,
    it was subsequently canonized as the official biography of St. Francis for the entire order.

    It was consequently ordered that other biographies be destroyed and banned from the order. Recent
    historical research has proposed this to be an attempt at **censorship**, however it's worth to mention
    that the norm was limited to the franciscan order, that no actual persecution against ownership of alternative
    biography has been recorded, and that these texts have indeed reached us.

    In addition, Bonaventura borrows extensively from previous biographies, particularly **Tommaso da Celano**'s works,
    often qouting the text word-by-word. The Legenda Maior's distinct feature is lack of concern with chronology,
    and the attempt at grouping events and accounts on the saint in theologically-coherent essays.

    For this reason, the Legenda Maior might be better understood as the attempt to systematize the theological
    importance of St. Francis, and to provide a uniform and authoritative narrative for the onboarding friars,
    in the now influent and institutionalized franciscan order.
  it: |-
    La Legenda Maior è la biografia di **San Francesco** normativa e ufficiale per l'**Ordine francescano**.
    Scritta nel 1263 da **Bonaventura da Bagnoregio**, all'epoca Ministro generale dell'Ordine Francescano,
    fu in seguito canonizzata come biografia ufficiale di San Francesco.

    Fu di conseguenza ordinato che le altre biografie venissero distrutte e ai frati ne fu proibito l'uso. La ricerca
    storica recente ha proposto che si sia trattato di un tentativo di **censura**; vale tuttavia la pena di ricordare
    che la norma fu limitata all'ordine francescano, che non è stata documentata alcuna effettiva persecuzione
    contro coloro che possedevano le biografie precedenti, e che questi testi sono effettivamente giunti fino a noi.

    Ad essi, inoltre, lo stesso Bonaventura attinge abbondantemente, utilizzando in particolare le opere di
    **Tommaso da Celano**, spesso citandone il testo parola per parola. Il tratto distintivo della Legenda Maior
    è la mancanza di interesse per la cronologia, e il tentativo di raggruppare eventi e racconti sul santo
    in saggi teologicamente coerenti.

    Per questo motivo, la Legenda Maior può essere meglio compresa come il tentativo di sistematizzare
    l'importanza teologica di San Francesco, e di fornire una narrazione uniforme e autorevole ai frati
    che entravano nell'ordine, ormai influente e istituzionalizzato.
